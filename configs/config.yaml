data:
  data_dir: "MachineLearningCVE"
  sample_frac: 1.0          # 0.1 → hızlı test, 1.0 → tam veri
  label_col: "Label"

preprocessing:
  variance_threshold: 0.01  # düşük varyanslı feature'ları at
  scale: true               # StandardScaler
  use_smote: true           # sınıf dengesizliğini gider

model:
  name: "random_forest"     # logistic_regression | random_forest | xgboost | lightgbm
  params:
    logistic_regression:
      max_iter: 1000
      C: 1.0
      n_jobs: -1
    random_forest:
      n_estimators: 100
      max_depth: null
      n_jobs: -1
    xgboost:
      n_estimators: 200
      learning_rate: 0.1
      n_jobs: -1
    lightgbm:
      n_estimators: 200
      learning_rate: 0.1
      verbose: -1
      n_jobs: -1

cv:
  n_splits: 5
  scoring:
    - f1_macro
    - accuracy
  random_state: 42

output:
  models_dir: "outputs/models"
  results_dir: "outputs/results"
  figures_dir: "outputs/figures"
  save_model: true

task: "multiclass"    # binary | multiclass
test_size: 0.2
random_state: 42
